<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LyricScroll360</title>
<style>
  /* GitHub-inspired Color Scheme & Typography
    Default is Light Mode. Dark mode is toggled via the 'dark-mode' class on the body.
  */
  :root {
    --bg-color: #f6f8fa;
    --container-bg: #ffffff;
    --text-color: #24292f;
    --border-color: #d0d7de;
    --chord-color: #8250df; /* GitHub purple for chords */
    --button-bg: #f6f8fa;
    --button-hover: #f3f4f6;
    --header-bg: #ffffff;
    --header-border: #d0d7de;
  }

  body.dark-mode {
    --bg-color: #0d1117;
    --container-bg: #161b22;
    --text-color: #c9d1d9;
    --border-color: #30363d;
    --chord-color: #a371f7; /* Lighter purple for dark mode visibility */
    --button-bg: #21262d;
    --button-hover: #30363d;
    --header-bg: #161b22;
    --header-border: #30363d;
  }

  body {
    margin: 0;
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    transition: background-color 0.3s, color 0.3s;
  }

  /* App Header Styling */
  #app-header {
    background-color: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
  }

  #app-title {
    font-weight: 600;
    font-size: 16px;
  }

  #app-author {
    color: #57606a;
    font-size: 12px;
  }

  body.dark-mode #app-author {
    color: #8b949e;
  }

  /* Controls Section Styling */
  #controls {
    background-color: var(--container-bg);
    border-bottom: 1px solid var(--border-color);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    z-index: 10;
  }

  select, button, input[type="range"] {
    background-color: var(--button-bg);
    color: var(--text-color);
    border: 1px solid var(--border-color);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    transition: background-color 0.2s;
  }

  button {
    cursor: pointer;
    font-weight: 500;
  }

  button:hover {
    background-color: var(--button-hover);
  }

  /* Main Prompter Area */
  #prompter-container {
    flex-grow: 1;
    overflow-y: auto;
    padding: 20px 40px;
    scroll-behavior: smooth;
    background-color: var(--bg-color);
  }

  #lyrics-display {
    font-size: 24px;
    line-height: 1.6;
    white-space: pre-wrap;
    padding-bottom: 60vh; /* Ensures the last line can scroll to the top */
    max-width: 800px;
    margin: 0 auto;
    background-color: var(--container-bg);
    padding: 30px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
  }

  .chord {
    color: var(--chord-color);
    font-weight: 600;
  }
</style>
</head>
<body>

<div id="app-header">
  <div>
    <div id="app-title">LyricScroll360</div>
    <div id="app-author">by Jeremiah Keller</div>
  </div>
  <div>Version 0.001</div>
</div>

<div id="controls">
  <select id="song-select">
    <option value="">Select a song...</option>
  </select>
  
  <div style="display:flex; align-items:center; gap:10px;">
    <label for="speed" style="font-size: 14px;">Speed:</label>
    <input type="range" id="speed" min="1" max="10" value="3">
  </div>
  
  <div style="display:flex; gap:10px;">
    <button id="toggle-scroll">Start</button>
    <button id="toggle-theme">Invert Colors</button>
  </div>
</div>

<div id="prompter-container">
  <div id="lyrics-display">Select a song to begin.</div>
</div>

<script>
  /* SONG DATABASE
    Add new songs here. Wrap chords in square brackets [like this].
  */
  const songs = {
    "Knockin' On Heaven's Door": `
[G] [D] [Am7]
Mama, take this badge off of me
[G] [D] [C]
I can't use it anymore
[G] [D] [Am7]
It's getting dark, too dark for me to see
[G] [D] [C]
I feel like I'm knocking on heaven's door

[G] [D] [C]
Knock, knock, knocking on heaven's door
[G] [D] [C]
Knock, knock, knocking on heaven's door
`,
    "Shelter From The Storm": `
[E] [B] [A] [E]
'Twas in another lifetime, one of toil and blood
[E] [A] [B]
When blackness was a virtue and the road was full of mud
[E] [A] [B]
I came in from the wilderness, a creature void of form
[E] [B] [A] [E]
"Come in," she said, "I'll give you shelter from the storm."
`,
    "All Along The Watchtower": `
[Cm] [A#] [G#] [A#]
"There must be some kind of way out of here,"
[Cm] [A#] [G#] [A#]
Said the joker to the thief.
[Cm] [A#] [G#] [A#]
"There's too much confusion,
[Cm] [A#] [G#] [A#]
I can't get no relief."
`
  };

  // DOM Elements Initialization
  const songSelect = document.getElementById('song-select');
  const lyricsDisplay = document.getElementById('lyrics-display');
  const toggleScrollBtn = document.getElementById('toggle-scroll');
  const toggleThemeBtn = document.getElementById('toggle-theme');
  const speedSlider = document.getElementById('speed');
  const container = document.getElementById('prompter-container');

  // State Variables
  let scrollInterval;
  let isScrolling = false;

  /* INITIALIZATION & LOCAL STORAGE
    Load saved preferences for theme and scrolling speed.
  */
  function loadPreferences() {
    // Load speed
    const savedSpeed = localStorage.getItem('lyricScrollSpeed');
    if (savedSpeed !== null) {
      speedSlider.value = savedSpeed;
    }

    // Load theme
    const savedTheme = localStorage.getItem('lyricScrollTheme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    }
  }

  // Populate the dropdown menu with songs from the database
  function populateSongList() {
    for (const title in songs) {
      const option = document.createElement('option');
      option.value = title;
      option.textContent = title;
      songSelect.appendChild(option);
    }
  }

  /* EVENT LISTENERS 
  */

  // Handle song selection
  songSelect.addEventListener('change', (e) => {
    stopScrolling();
    const title = e.target.value;
    
    if (title) {
      let rawText = songs[title].trim();
      // Regex to find text within brackets and apply the CSS chord class
      rawText = rawText.replace(/\[(.*?)\]/g, '<span class="chord">[$1]</span>');
      lyricsDisplay.innerHTML = rawText;
      container.scrollTop = 0; // Reset scroll position to top
    } else {
      lyricsDisplay.innerHTML = "Select a song to begin.";
    }
  });

  // Save speed preference when slider is adjusted
  speedSlider.addEventListener('input', (e) => {
    localStorage.setItem('lyricScrollSpeed', e.target.value);
  });

  // Handle Play/Stop button
  toggleScrollBtn.addEventListener('click', () => {
    if (isScrolling) {
      stopScrolling();
    } else {
      startScrolling();
    }
  });

  // Handle Theme Toggle (Light/Dark mode)
  toggleThemeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('lyricScrollTheme', isDark ? 'dark' : 'light');
  });

  /* SCROLLING LOGIC 
  */
  function startScrolling() {
    if (!songSelect.value) return; // Prevent scrolling if no song is selected
    
    isScrolling = true;
    toggleScrollBtn.textContent = "Stop";
    
    // Execute scroll periodically based on interval
    scrollInterval = setInterval(() => {
      const speed = parseInt(speedSlider.value);
      // Adjust the multiplier to fine-tune the base speed
      container.scrollTop += speed * 0.3;
    }, 50);
  }

  function stopScrolling() {
    isScrolling = false;
    toggleScrollBtn.textContent = "Start";
    clearInterval(scrollInterval);
  }

  // Run initialization on load
  loadPreferences();
  populateSongList();

</script>
</body>
</html>
