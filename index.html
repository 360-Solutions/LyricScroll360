<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LyricScroll360</title>
<style>
  /* GitHub-inspired Color Scheme & Typography */
  :root {
    --bg-color: #f6f8fa;
    --container-bg: #ffffff;
    --text-color: #24292f;
    --border-color: #d0d7de;
    --chord-color: #8250df;
    --button-bg: #f6f8fa;
    --button-hover: #f3f4f6;
    --header-bg: #ffffff;
  }

  body.dark-mode {
    --bg-color: #0d1117;
    --container-bg: #161b22;
    --text-color: #c9d1d9;
    --border-color: #30363d;
    --chord-color: #a371f7;
    --button-bg: #21262d;
    --button-hover: #30363d;
    --header-bg: #161b22;
  }

  body {
    margin: 0;
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Thin Top Control Bar */
  #top-bar {
    display: flex;
    flex-direction: row;
    align-items: center;
    background-color: var(--header-bg);
    border-bottom: 1px solid var(--border-color);
    padding: 8px 12px;
    gap: 15px;
    overflow-x: auto;
    white-space: nowrap;
    z-index: 10;
  }

  #branding {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
    padding-right: 10px;
    border-right: 1px solid var(--border-color);
  }

  #app-title {
    font-weight: 600;
    font-size: 16px;
  }

  #app-author {
    color: #57606a;
    font-size: 11px;
  }
  
  body.dark-mode #app-author { color: #8b949e; }

  /* Buttons */
  button {
    background-color: var(--button-bg);
    color: var(--text-color);
    border: 1px solid var(--border-color);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
    flex-shrink: 0;
  }

  button:active { background-color: var(--border-color); }

  #btn-select-song {
    width: 220px;
    text-overflow: ellipsis;
    overflow: hidden;
    text-align: left;
  }

  /* Main Prompter Area */
  #prompter-container {
    flex-grow: 1;
    overflow-y: auto;
    padding: 20px 40px;
    background-color: var(--bg-color);
  }

  /* Visible Custom Scrollbar */
  #prompter-container::-webkit-scrollbar {
    width: 24px;
  }
  #prompter-container::-webkit-scrollbar-track {
    background: var(--bg-color);
    border-left: 1px solid var(--border-color);
  }
  #prompter-container::-webkit-scrollbar-thumb {
    background: #8c959f;
    border-radius: 12px;
    border: 4px solid var(--bg-color);
  }

  #lyrics-display {
    font-size: 26px;
    line-height: 1.6;
    white-space: pre-wrap;
    padding-bottom: 70vh;
    max-width: 900px;
    margin: 0 auto;
    background-color: var(--container-bg);
    padding: 30px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
  }

  .chord {
    color: var(--chord-color);
    font-weight: 600;
  }

  .metadata {
    font-size: 14px;
    color: #57606a;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-color);
  }

  body.dark-mode .metadata { color: #8b949e; }

  /* Modal Dialogs */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .modal-content {
    background: var(--container-bg);
    padding: 20px;
    border-radius: 8px;
    width: 85%;
    max-width: 500px;
    max-height: 80vh;
    overflow-y: auto;
    border: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .modal-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  /* Large Speed Slider */
  #speed-slider {
    width: 100%;
    height: 40px;
  }

  .song-list-item {
    padding: 12px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    margin-bottom: 8px;
    background: var(--button-bg);
    cursor: pointer;
    font-size: 16px;
  }
  
  .song-list-item:active { background: var(--border-color); }
</style>
</head>
<body>

<div id="top-bar">
  <div id="branding">
    <span id="app-title">LyricScroll360 v0.001</span>
    <span id="app-author">by Jeremiah Keller</span>
  </div>
  
  <button id="btn-toggle-scroll">Start Scrolling</button>
  <button id="btn-speed">Speed: 50</button>
  <button id="btn-select-song">Select a Song...</button>
  <button id="btn-theme">Invert Colors</button>
</div>

<div id="prompter-container">
  <div id="lyrics-display">Select a song to begin.</div>
</div>

<div id="modal-speed" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-title">Adjust Scroll Speed</div>
    <div style="text-align: center; font-size: 24px; font-weight: bold;" id="speed-display">50</div>
    <input type="range" id="speed-slider" min="1" max="100" value="50">
    <button onclick="closeModals()" style="margin-top: 10px;">Close</button>
  </div>
</div>

<div id="modal-songs" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-title">Song Library</div>
    <div id="song-list-container"></div>
    <button onclick="closeModals()" style="margin-top: 10px;">Close</button>
  </div>
</div>

<script>
  /* SONG DATABASE 
     Includes artist, key, and bpm metadata for statistical tracking.
  */
  const songs = {
    "I've Got Love": {
      artist: "Bitty McLean",
      key: "G",
      bpm: "85",
      lyrics: `
[G]
My love will always be true
[C]                           [D]
Just like the break of dawn forever brand new
[G]
As true as the rain falls from the sky
[C]                           [D]
My love is a river that will never run dry
[G]
Cause I've got love
[C]                           [D]
That will grow and grow I've got love want the world to know
`
    },
    "Knockin' On Heaven's Door": {
      artist: "Bob Dylan",
      key: "G",
      bpm: "70",
      lyrics: `
[G] [D] [Am7]
Mama, take this badge off of me
[G] [D] [C]
I can't use it anymore
[G] [D] [Am7]
It's getting dark, too dark for me to see
[G] [D] [C]
I feel like I'm knocking on heaven's door
`
    },
    "Shelter From The Storm": {
      artist: "Bob Dylan",
      key: "E",
      bpm: "105",
      lyrics: `
[E] [B] [A] [E]
'Twas in another lifetime, one of toil and blood
[E] [A] [B]
When blackness was a virtue and the road was full of mud
`
    }
  };

  // DOM Elements
  const container = document.getElementById('prompter-container');
  const lyricsDisplay = document.getElementById('lyrics-display');
  const btnScroll = document.getElementById('btn-toggle-scroll');
  const btnSpeed = document.getElementById('btn-speed');
  const btnSelectSong = document.getElementById('btn-select-song');
  const btnTheme = document.getElementById('btn-theme');
  
  const modalSpeed = document.getElementById('modal-speed');
  const modalSongs = document.getElementById('modal-songs');
  const speedSlider = document.getElementById('speed-slider');
  const speedDisplay = document.getElementById('speed-display');
  const songListContainer = document.getElementById('song-list-container');

  let scrollInterval;
  let isScrolling = false;
  let currentSong = "";

  /* INITIALIZATION */
  function init() {
    // Load Theme
    if (localStorage.getItem('lyricScrollTheme') === 'dark') {
      document.body.classList.add('dark-mode');
    }
    
    // Load Speed
    const savedSpeed = localStorage.getItem('lyricScrollSpeed');
    if (savedSpeed) {
      speedSlider.value = savedSpeed;
      updateSpeedDisplay(savedSpeed);
    } else {
      updateSpeedDisplay(50); // Default
    }

    // Populate Song List Modal
    for (const title in songs) {
      const div = document.createElement('div');
      div.className = 'song-list-item';
      div.textContent = title + " - " + songs[title].artist;
      div.onclick = () => loadSong(title);
      songListContainer.appendChild(div);
    }
    
    // Auto-load the first song to start
    loadSong("I've Got Love");
  }

  /* SONG LOADING & FORMATTING */
  function loadSong(title) {
    currentSong = title;
    const songData = songs[title];
    btnSelectSong.textContent = title;
    
    let html = "<div class='metadata'>Artist: " + songData.artist + " | Key: " + songData.key + " | BPM: " + songData.bpm + "</div>";
    
    let rawText = songData.lyrics.trim();
    rawText = rawText.replace(/\[(.*?)\]/g, '<span class="chord">[$1]</span>');
    html += rawText;
    
    lyricsDisplay.innerHTML = html;
    container.scrollTop = 0;
    closeModals();
    stopScrolling();
  }

  /* SCROLLING LOGIC */
  function startScrolling() {
    if (!currentSong) return;
    isScrolling = true;
    btnScroll.textContent = "Stop Scrolling";
    btnScroll.style.backgroundColor = "#ffcccc"; // Visual indicator
    
    // Fast 20ms interval for smooth continuous movement
    scrollInterval = setInterval(() => {
      const speed = parseInt(speedSlider.value);
      // Speed multiplier formula to allow very fast scrolling at 100
      container.scrollTop += (speed * 0.05); 
    }, 20);
  }

  function stopScrolling() {
    isScrolling = false;
    btnScroll.textContent = "Start Scrolling";
    btnScroll.style.backgroundColor = ""; 
    clearInterval(scrollInterval);
  }

  btnScroll.onclick = () => isScrolling ? stopScrolling() : startScrolling();

  /* MODAL & SETTINGS LOGIC */
  function closeModals() {
    modalSpeed.style.display = "none";
    modalSongs.style.display = "none";
  }

  function updateSpeedDisplay(val) {
    speedDisplay.textContent = val;
    btnSpeed.textContent = "Speed: " + val;
  }

  btnSpeed.onclick = () => modalSpeed.style.display = "flex";
  btnSelectSong.onclick = () => modalSongs.style.display = "flex";

  speedSlider.oninput = (e) => {
    const val = e.target.value;
    updateSpeedDisplay(val);
    localStorage.setItem('lyricScrollSpeed', val);
  };

  btnTheme.onclick = () => {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('lyricScrollTheme', isDark ? 'dark' : 'light');
  };

  init();
</script>
</body>
</html>
